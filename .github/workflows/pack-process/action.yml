name: 'Pack Process.'

runs:
  using: 'composite'
  steps:
      - name: Make Anykernel3 Flasher
        if: env.PACK_METHOD == 'Anykernel3'
        shell: bash
        run: |
          TIME=$(date +"%Y%m%d%H%M%S")

          cd $GITHUB_WORKSPACE/device_kernel/
          if [[ -d "arch/arm64/configs" ]]; then
            IMAGE_DIR="$GITHUB_WORKSPACE/device_kernel/out/arch/arm64/boot"
          else
            IMAGE_DIR="$GITHUB_WORKSPACE/device_kernel/out/arch/arm/boot"
          fi

          mkdir -p tmp

          if [[ "${{ env.AK3_SOURCE }}" =~ "osm0sis" ]]; then
            sed -i 's/ExampleKernel by osm0sis @ xda-developers/NonGKI Kernel Build by JackAltman @ Github/g' Anykernel3/anykernel.sh
            sed -i 's/do.devicecheck=1/do.devicecheck=0/g' Anykernel3/anykernel.sh
            sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' Anykernel3/anykernel.sh
            sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' Anykernel3/anykernel.sh
            echo "Now using official Anykernel3."
          else
            echo "Now using custom Anykernel3."
          fi

          if [[ -f "$IMAGE_DIR/Image.gz-dtb" ]]; then
            cp -fp $IMAGE_DIR/Image.gz-dtb tmp
            echo "Found Image.gz-dtb !"
          elif [[ -f "$IMAGE_DIR/Image.gz" ]]; then
            cp -fp $IMAGE_DIR/Image.gz tmp
            echo "Found Image.gz !"
          elif [[ -f "$IMAGE_DIR/zImage-dtb" ]]; then
            cp -fp $IMAGE_DIR/zImage-dtb tmp
            echo "Found zImage-dtb (ARMV7A) !"
          elif [[ -f "$IMAGE_DIR/Image" ]]; then
            # gzip -c $IMAGE_DIR/Image > $IMAGE_DIR/Image.gz
            # cp -fp $IMAGE_DIR/Image.gz tmp
            cp -fp $IMAGE_DIR/Image tmp
            echo "Found Image !"
          fi

          if [[ -f "$IMAGE_DIR/dtbo.img" ]]; then
            cp -fp $IMAGE_DIR/dtbo.img tmp
            echo "Found dtbo.img !"
          else
            echo "Doesn't found dtbo.img! Your device maybe needn't the file."
          fi

          if [[ -f "$IMAGE_DIR/dtb.img" ]]; then
            cp -fp $IMAGE_DIR/dtb.img tmp/dtb
            echo "Found dtb.img, converted dtb !"
          elif [ -f "$IMAGE_DIR/dtb" ]; then
            echo "Found DTB!"
            cp -fp $IMAGE_DIR/dtb tmp
          elif [ "${{ env.GENERATE_DTB }}" == "true" ]; then
            if ls $IMAGE_DIR/dts/${{ env.GENERATE_CHIP }}/*.dtb 1> /dev/null 2>&1; then
                DTB_PATH="dts"
            elif ls $IMAGE_DIR/dts/vendor/${{ env.GENERATE_CHIP }}/*.dtb 1> /dev/null 2>&1; then
                DTB_PATH="dts/vendor"
            else
                echo "Not found dts, abort."
                false
            fi

            cat $IMAGE_DIR/$DTB_PATH/${{ env.GENERATE_CHIP }}/*.dtb > $IMAGE_DIR/dtb
            cp -fp $IMAGE_DIR/dtb tmp
            echo "Generated ${{ env.GENERATE_CHIP }} DTB."
          else
            echo "Doesn't found dtb or dtb.img! Your device maybe needn't the file."
          fi

          if [ "${{ env.PACK_KMODULES }}" == "true" ]; then
            echo "Packing kernel modules (.ko)..."
            mkdir -p tmp/modules/vendor/lib/modules
            find $GITHUB_WORKSPACE/device_kernel/out/ -name "*.ko" -exec cp -fp {} tmp/modules/vendor/lib/modules/ \;
            if [ "$(ls -A tmp/modules/vendor/lib/modules/ 2>/dev/null)" ]; then
              echo "Found and copied kernel modules."
            else
              echo "No kernel modules found, skipping."
              rm -rf tmp/modules
            fi
          fi

          cp -rp ./Anykernel3/* tmp
          cd tmp
          7za a -mx9 tmp.zip *
          cd ..
          cp -fp tmp/tmp.zip ${{ env.DEVICE_CODENAME }}-${{ env.ROM_TEXT }}-$TIME-${{ env.PACK_METHOD }}.zip
          rm -rf tmp

          echo "PACK_NAME=${{ env.DEVICE_CODENAME }}-${{ env.ROM_TEXT }}-$TIME-${{ env.PACK_METHOD }}.zip" >> $GITHUB_ENV

      - name: Make Latest Boot Image
        if: env.PACK_METHOD == 'MKBOOTIMG'
        shell: bash
        run: |
          cd $GITHUB_WORKSPACE/
          IMAGE_DIR="$GITHUB_WORKSPACE/device_kernel/out/arch/arm64/boot"
          TIME=$(date +"%Y%m%d%H%M%S")
          FORMAT_MKBOOTING=$(echo `mkboottools/unpack_bootimg.py --boot_img=boot_source_${{ env.DEVICE_NAME }}.img --format mkbootimg`)

          mkdir -p tmp

          mkboottools/unpack_bootimg.py --boot_img boot_source_${{ env.DEVICE_NAME }}.img

          if [[ -f "$IMAGE_DIR/Image.gz-dtb" ]]; then
            rm -f out/kernel
            cp -fp $IMAGE_DIR/Image.gz-dtb out/kernel
            echo "Found Image.gz-dtb !"
          elif [[ -f "$IMAGE_DIR/Image.gz" ]]; then
            rm -f out/kernel
            cp -fp $IMAGE_DIR/Image.gz out/kernel
            echo "Found Image.gz !"
          elif [[ -f "$IMAGE_DIR/Image" ]]; then
            rm -f out/kernel
            cp -fp $IMAGE_DIR/Image out/kernel
            echo "Found Image !"
          fi

          if [[ -f "$IMAGE_DIR/dtbo.img" ]]; then
            cp -fp $IMAGE_DIR/dtbo.img tmp
            echo "Found dtbo.img !"
          else
            echo "Doesn't found dtbo.img! Your device maybe needn't the file."
          fi

          if [[ -f "$IMAGE_DIR/dtb.img" ]]; then
            cp -fp $IMAGE_DIR/dtb.img out/dtb
            echo "Found dtb.img, converted dtb !"
          elif [ -f "$IMAGE_DIR/dtb" ]; then
            echo "Found DTB!"
            cp -fp $IMAGE_DIR/dtb out/dtb
          elif [ "${{ env.GENERATE_DTB }}" == "true" ]; then
            if ls $IMAGE_DIR/dts/${{ env.GENERATE_CHIP }}/*.dtb 1> /dev/null 2>&1; then
                DTB_PATH="dts"
            elif ls $IMAGE_DIR/dts/vendor/${{ env.GENERATE_CHIP }}/*.dtb 1> /dev/null 2>&1; then
                DTB_PATH="dts/vendor"
            else
                echo "Not found dts, abort."
                false
            fi

            cat $IMAGE_DIR/$DTB_PATH/${{ env.GENERATE_CHIP }}/*.dtb > $IMAGE_DIR/dtb
            cp -fp $IMAGE_DIR/dtb out/dtb
            echo "Generated ${{ env.GENERATE_CHIP }} DTB."
          else
            echo "Doesn't found DTB! Your device maybe needn't the file."
          fi

          if [[ -f "tmp/dtbo.img" ]]; then
            eval "mkboottools/mkbootimg.py $FORMAT_MKBOOTING -o boot.img"
            cp -fp boot.img tmp/
            cd tmp
            7za a -mx9 tmp.zip *
            cd ..
            cp -fp tmp/tmp.zip ${{ env.DEVICE_CODENAME }}-${{ env.ROM_TEXT }}-$TIME-image.zip
            rm -rf tmp
            echo "PACK_NAME=${{ env.DEVICE_CODENAME }}-${{ env.ROM_TEXT }}-$TIME-image.zip" >> $GITHUB_ENV

          else
            eval "mkboottools/mkbootimg.py $FORMAT_MKBOOTING -o ${{ env.DEVICE_CODENAME }}-${{ env.ROM_TEXT }}-$TIME-image.img"
            echo "PACK_NAME=${{ env.DEVICE_CODENAME }}-${{ env.ROM_TEXT }}-$TIME-image.img" >> $GITHUB_ENV

          fi

          rm -f $GITHUB_WORKSPACE/boot_source_${{ env.DEVICE_NAME }}.img
